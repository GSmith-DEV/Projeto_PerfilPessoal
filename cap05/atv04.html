<!DOCTYPE html>
<html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>

        <style>
            body {
                max-width: 800px;
                margin: auto;
                margin-bottom: 50px;
            }
            h1 {
                font-family: 'Times New Roman', Times, serif;
                color: purple;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            fieldset {
                margin-bottom: 16px;
            }

            label {
                display: block;
                margin-top: 8px;
            }

            small {
                display: block;
                margin-top: 4px;
            }
        </style>
    </head>
    <body>

        <header>
            <h1>Semana de Tecnologia IFAL</h1>
            <p><a href="../index.html">← Voltar para a página principal</a></p>
        </header>

        <main>
            <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

                <fieldset>
                    <legend>Identificação do participante</legend>

                    <label for="nome">Nome completo *</label>
                    <input type="text" id="nome" name="nome" required/>

                    <label for="email">E-mail institucional *</label>
                    <input type="email" id="email" name="email" required/>

                    <label for="cidade">Cidade de origem</label>
                    <input type="text" id="cidade" name="cidade" list="cidades"/>

                    <datalist id="cidades">
                        <option value="Maceió">
                        <option value="Arapiraca">
                        <option value="Palmeira dos Índios">
                        <option value="Rio Largo">
                        <option value="Penedo">
                        <option value="União dos Palmares">
                        <option value="Delmiro Gouveia">
                        <option value="Marechal Deodoro">
                    </datalist>

                    <label for="foto">Foto para crachá</label>
                    <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="ajuda-foto"/>

                    <small id="ajuda-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small>

                </fieldset>


                <fieldset>
                    <legend>Preferências para o evento</legend>

                    <label for="chegada">Data e hora preferida para chegada</label>
                    <input type="datetime-local" id="chegada"  name="chegada"/>

                    <label for="experiencia">Nível de experiência:
                        <span id="valor-experiencia">5</span>/10
                    </label>
                    <input type="range" id="experiencia" name="experiencia" min="0" max="10" step="1" value="5" oninput="document.getElementById('valor-experiencia').textContent = this.value"/>

                    <label for="cor_camiseta">Cor de preferência para a camiseta</label>
                    <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8"/>

                    <label for="oficinas">Oficinas de interesse</label>
                    <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="ajuda-oficinas">
                        <option value="web">Desenvolvimento Web</option>
                        <option value="ia">Inteligência Artificial</option>
                        <option value="seguranca">Segurança da Informação</option>
                        <option value="jogos">Desenvolvimento de Jogos</option>
                        <option value="banco_dados">Banco de Dados</option>
                    </select>

                    <small id="ajuda-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small>
                </fieldset>

                <input type="hidden" name="edicao" value="2026"/>

                <button type="submit">Confirmar inscrição</button>

            </form>
        </main>
    </body>
</html>
