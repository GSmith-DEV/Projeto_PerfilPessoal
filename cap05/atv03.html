<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>PWEB1 - Cap. 05 - AT03 - Formulário de Matrícula Acadêmica</title>
        <style>
            main {
                max-width: 800px;
                margin: auto;
            }
            h1 {
                font-family: 'Times New Roman', Times, serif;
                color: purple;
            }
            form {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

        </style>
    </head>
    <body>
        <header>
            <h1>Formulário de Matrícula Acadêmica</h1>
            <p><a href="../index.html">← Voltar à página principal</a></p>
        </header>

        <main>
            <p style="color: red;">* Campos obrigatórios</p>
            <form action="https://httpbin.org/post" method="post">

                <fieldset>

                    <legend>Dados Pessoais</legend>

                    <div>
                        <label for="nome">Nome completo *</label>
                        <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">
                    </div>
                    <div>
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}\-\d{2}" placeholder="000.000.000-00" title="CPF no formato 000.000.000-00">
                    </div>
                    <div>
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(82) 99999-9999">
                    </div>
                    <div>
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </fieldset>

                <fieldset>

                    <legend>Dados Acadêmicos</legend>

                    <label for="curso">Curso *</label>

                    <select id="curso" name="curso" required>

                        <option value="">Selecione um Curso</option>

                        <optgroup label="Computação">
                            <option value="sistemas_da_informacao">Sistemas de Informação</option>
                            <option value="ciencia_da_computacao">Ciência da Computação</option>
                            <option value="engenharia_da_computacao">Engenharia da Computação</option>
                        </optgroup>

                        <optgroup label="Gestão">
                            <option value="administracao">Administração</option>
                            <option value="ciencias_contabeis">Ciências Contábeis</option>
                            <option value="engenharia_de_producao">Engenharia de Produção</option>
                        </optgroup>

                    </select>

                    <fieldset>
                        <legend>Período *</legend>

                        <input type="radio" id="matutino" value="manha" name="periodo" required>
                        <label for="matutino">Manhã</label>

                        <input type="radio" id="vespertino" value="tarde" name="periodo">
                        <label for="vespertino">Tarde</label>

                        <input type="radio" id="noturno" value="noite" name="periodo">
                        <label for="noturno">Noite</label>
                    </fieldset>

                    <label for="ano_ingresso">Ano de Ingresso *</label>
                    <input type="number" id="ano_ingresso" name="ano_ingresso" min="2025" max="2030" required>

                </fieldset>

                <fieldset>
                    <legend>Áreas de Interesse</legend>

                    <div>
                        <input type="checkbox" id="web" value="web" name="interesses[]">
                        <label for="web">Desenvolvimento Web</label>
                    </div>
                    <div>
                        <input type="checkbox" id="banco_dados" value="banco_dados" name="interesses[]">
                        <label for="banco_dados">Banco de Dados</label>
                    </div>
                    <div>
                        <input type="checkbox" id="ai" value="ai" name="interesses[]">
                        <label for="ai">Inteligência Artificial</label>
                    </div>
                    <div>
                        <input type="checkbox" id="seguraca_informacao" value="seguraca_informacao" name="interesses[]">
                        <label for="seguraca_informacao">Segurança da Informação</label>
                    </div>
                    <div>
                        <input type="checkbox" id="infraestrutura" value="infraestrutura" name="interesses[]">
                        <label for="infraestrutura">Infraestrutura</label>
                    </div>
                </fieldset>

                <button type="submit">Solicitar Matrícula</button>
                <button type="reset">Limpar formulário</button>
            </form>
        </main>
    </body>
</html>
